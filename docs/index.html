<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>進擊的小黨 — 歷年地方議員選舉村里級 GIS（2014 / 2018 / 2022）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500&family=DM+Sans:wght@400;500&family=Noto+Sans+TC:wght@400;500&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ── しなやかデザイン Shinayaka tokens ── */
  :root{
    --bg:#F2F2F2;          /* 暖灰の余白 */
    --panel:#FFFFFF;
    --panel-soft:#F1F1F1;
    --ink:#333333;         /* 本文・純黒は使わない */
    --ink-strong:#000000;  /* 見出しのみ */
    --ink-faint:#9a9a9a;
    --line:#dcdcdc;
    --tint:#D6DCE0;        /* 静かな青灰 */
    --tint-2:#E4E1DA;      /* 紙の暖色 */
    --accent:#b8a98c;      /* 控えめな金茶 */
    --shu:rgba(166,57,44,.9);   /* 古樸朱紅 */
    --shu-soft:#E7D3CC;
    --midori:rgba(46,107,78,.9);
    --midori-soft:#D6DFD7;
    --ls-wide:0.16em; --ls:0.08em;
    --ease:cubic-bezier(.22,.61,.36,1);
    --gothic:"Noto Sans TC",sans-serif;
    --body:"DM Sans","Noto Sans TC",sans-serif;
    --latin:"Cormorant","Noto Serif TC",serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--body);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #map{position:absolute;inset:0;background:var(--bg)}
  .leaflet-container{background:#EAEAEA;font-family:var(--body)}

  /* ── 控制面板（白・柔角5px・近乎無影） ── */
  #panel{position:absolute;top:22px;left:22px;z-index:1000;width:320px;max-height:calc(100% - 44px);
    overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:26px 24px 18px;box-shadow:0 1px 0 rgba(0,0,0,.04)}
  #panel::-webkit-scrollbar{width:7px} #panel::-webkit-scrollbar-thumb{background:#e2e2e2;border-radius:999px}

  .brand{font-family:var(--latin);font-size:13px;letter-spacing:var(--ls-wide);color:var(--accent);
    text-transform:uppercase;margin-bottom:6px}
  #panel h1{font-family:var(--latin);font-weight:500;font-size:34px;line-height:1.1;color:var(--ink-strong);
    letter-spacing:.01em;margin:0 0 4px}
  #panel h1 .zh{font-family:"Noto Serif TC",serif;font-weight:700;letter-spacing:.08em}
  #panel .sub{font-size:12.5px;color:var(--ink-faint);margin:10px 0 26px;line-height:1.7;letter-spacing:.01em}

  .grp{margin-bottom:24px}
  .grp>label{display:block;font-size:10.5px;color:var(--ink-faint);letter-spacing:var(--ls-wide);
    text-transform:uppercase;margin-bottom:11px}
  .seg{display:flex;flex-wrap:wrap;gap:7px}
  .seg button{flex:1 1 auto;min-width:44px;padding:8px 9px;font-family:var(--body);font-size:12.5px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:5px;cursor:pointer;
    letter-spacing:var(--ls);transition:all .5s var(--ease)}
  .seg button:hover{border-color:var(--accent)}
  .seg button.on{background:var(--shu-soft);border-color:var(--shu);color:#7a2a20;font-weight:500}
  .seg button .dot{display:inline-block;width:8px;height:8px;border-radius:999px;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.15)}
  #poiNote,#labelNote{font-size:10.5px;color:var(--ink-faint);margin-top:8px;letter-spacing:.01em;line-height:1.5}
  /* 面量圖上的得票標註（字級隨縮放，白描邊在色塊上可讀）*/
  .vlab{text-align:center;line-height:1.0;font-family:var(--body);white-space:nowrap;
    transform:translate(-50%,-50%);
    text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff,0 0 4px #fff}
  .vlab b{display:block;font-weight:700;color:var(--shu);font-size:var(--lab,11px);letter-spacing:.01em}
  .vlab i{display:block;font-style:normal;font-size:calc(var(--lab,11px) - 2.5px);color:#5f5f5f;
    font-variant-numeric:tabular-nums;margin-top:1px}
  .layerbtn{display:block;width:100%;text-align:left;padding:13px 14px;margin-bottom:8px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:5px;cursor:pointer;
    transition:all .5s var(--ease)}
  .layerbtn:hover{border-color:var(--accent)}
  .layerbtn.on{background:var(--shu-soft);border-color:var(--shu)}
  .layerbtn .t{font-weight:500;font-size:13.5px;letter-spacing:.03em;color:var(--ink-strong)}
  .layerbtn .d{font-size:11px;color:var(--ink-faint);margin-top:4px;line-height:1.55;letter-spacing:.01em}
  .layerbtn.on .t{color:#7a2a20}
  #focusRow{margin-top:13px;display:none}
  #search{width:100%;padding:9px 11px;font-family:var(--body);font-size:12.5px;background:var(--panel);
    border:1px solid var(--line);border-radius:5px;color:var(--ink);letter-spacing:var(--ls);
    transition:border-color .5s var(--ease)}
  #search:focus{outline:none;border-color:var(--shu)}
  #search::placeholder{color:#bdbdbd}

  /* ── 圖例 ── */
  #legend{margin-top:4px;font-size:11.5px;color:var(--ink)}
  #legend .row{display:flex;align-items:center;gap:8px;margin:4px 0}
  #legend .sw{width:16px;height:11px;border-radius:2px;flex:none}
  #legend .cap{color:var(--ink-faint);font-size:11px;margin:7px 0 5px;line-height:1.5;letter-spacing:.01em}

  .foot{font-size:10px;color:#b0b0b0;margin-top:16px;line-height:1.6;border-top:1px solid var(--line);
    padding-top:11px;letter-spacing:.01em}
  .foot a{color:var(--accent);text-decoration:none} .foot a:hover{text-decoration:underline}

  /* ── 資訊框 ── */
  #info{position:absolute;top:22px;right:22px;z-index:1000;width:276px;background:var(--panel);
    border:1px solid var(--line);border-radius:5px;padding:20px 20px 16px;
    box-shadow:0 1px 0 rgba(0,0,0,.04);display:none}
  #info .vname{font-family:var(--gothic);font-size:18px;font-weight:500;color:var(--ink-strong);letter-spacing:.04em}
  #info .vloc{font-size:11.5px;color:var(--ink-faint);margin-bottom:14px;letter-spacing:var(--ls)}
  #info table{width:100%;border-collapse:collapse;font-size:12px}
  #info td{padding:5px 0;border-bottom:1px solid #ececec}
  #info td.r{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:500;letter-spacing:.02em}
  .hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1000;font-size:11px;
    color:var(--ink-faint);background:rgba(255,255,255,.82);padding:6px 15px;border-radius:999px;
    border:1px solid var(--line);letter-spacing:var(--ls)}
  #loading{position:absolute;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--ink-faint);font-size:13px;flex-direction:column;gap:14px;letter-spacing:var(--ls)}
  .spin{width:24px;height:24px;border:2px solid var(--line);border-top-color:var(--shu);border-radius:999px;animation:s 1.1s var(--ease) infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .leaflet-bar a{color:var(--ink)!important;border-radius:5px}

  /* 面板收合鈕（手機才顯示）*/
  #panelToggle{display:none;position:absolute;top:12px;right:12px;z-index:2;width:34px;height:34px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;
    font-size:17px;line-height:1;cursor:pointer;align-items:center;justify-content:center}

  /* ── 手機 RWD：面板變底部可收合抽屜 ── */
  @media (max-width:680px){
    #panel{top:auto;bottom:0;left:0;right:0;width:auto;max-height:54vh;
      border-radius:16px 16px 0 0;padding:16px 18px 18px;
      box-shadow:0 -4px 24px rgba(0,0,0,.12)}
    #panel.collapsed{max-height:64px;overflow:hidden;padding-bottom:10px}
    #panel.collapsed .sub,#panel.collapsed .grp,#panel.collapsed .foot{display:none}
    #panelToggle{display:flex}
    #panel h1{font-size:25px}
    #panel .brand{margin-bottom:3px}
    #panel .sub{margin:8px 0 16px}
    .grp{margin-bottom:16px}
    #info{top:10px;bottom:auto;left:10px;right:10px;width:auto;max-height:42vh;overflow:auto}
    .hint{display:none}
    .seg button{min-width:0;padding:9px 8px}
    .leaflet-control-zoom{margin-bottom:58vh!important}
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <button id="panelToggle" aria-label="收合/展開面板">▾</button>
  <div class="brand">Shinayaka · 村里級 GIS</div>
  <h1><span class="zh">進擊的小黨</span></h1>
  <p class="sub">2014 / 2018 / 2022 三屆縣市・直轄市議員選舉得票（含落選）。為時代力量、台灣基進、小民參政歐巴桑聯盟等小黨佈局而整理。</p>
  <a href="winners.html" style="display:block;font-size:12.5px;color:var(--shu);text-decoration:none;letter-spacing:.04em;margin:-8px 0 18px;font-weight:500">▸ 小黨當選者・選區地圖</a>

  <div class="grp">
    <label>分析圖層 ・ Layers</label>
    <button class="layerbtn on" data-layer="small"><span class="t">① 小黨得票熱區</span><div class="d">各里投給小黨議員候選人的得票率</div></button>
    <button class="layerbtn" data-layer="compete"><span class="t">② 全候選人競爭格局</span><div class="d">各里領先政黨與藍綠白小黨結構</div></button>
    <button class="layerbtn" data-layer="trend"><span class="t">③ 跨屆成長趨勢</span><div class="d">小黨得票率 2014→2022 消長（朱升綠降）</div></button>
    <button class="layerbtn" data-layer="white"><span class="t">④ 白地潛力</span><div class="d">政黨票挺小黨、但無小黨議員參選的里</div></button>
    <div id="focusRow" class="grp">
      <label>焦點政黨 ・ Focus</label>
      <div class="seg" id="focusSeg">
        <button data-f="all" class="on">小黨合計</button>
        <button data-f="npp">時代力量</button>
        <button data-f="tsp">台灣基進</button>
        <button data-f="ob">歐巴桑</button>
        <button data-f="green">綠黨</button>
        <button data-f="sdp">社民黨</button>
      </div>
    </div>
  </div>

  <div class="grp" id="yearGrp">
    <label>選舉屆別 ・ Year</label>
    <div class="seg" id="yearSeg">
      <button data-y="2014">2014</button>
      <button data-y="2018">2018</button>
      <button data-y="2022" class="on">2022</button>
    </div>
  </div>

  <div class="grp">
    <label>搜尋村里 / 行政區 ・ Search</label>
    <input id="search" placeholder="例：北投區、中正里…" autocomplete="off" />
  </div>

  <div class="grp">
    <label>拜票地點 ・ Canvass spots</label>
    <div class="seg" id="poiSeg">
      <button data-poi="market"><span class="dot" style="background:#D9772B"></span>市場</button>
      <button data-poi="post"><span class="dot" style="background:#2E7D46"></span>郵局</button>
      <button data-poi="temple"><span class="dot" style="background:#B23A86"></span>宮廟</button>
      <button data-poi="transit"><span class="dot" style="background:#2E6DA4"></span>車站</button>
    </div>
    <div id="poiNote">放大到鄉鎮層級可顯示拜票點</div>
  </div>

  <div class="grp">
    <label>道路 ・ Roads</label>
    <div class="seg">
      <button id="roadBtn" style="flex:1 1 100%"><span class="dot" style="background:#6b7884"></span>省道・主要道路</button>
    </div>
  </div>

  <div class="grp">
    <label>得票標註 ・ Labels</label>
    <div class="seg">
      <button id="labelBtn" style="flex:1 1 100%">在地圖標小黨得票數／率</button>
    </div>
    <div id="labelNote">放大到鄉鎮層級顯示標註</div>
  </div>

  <div class="grp">
    <label>圖例 ・ Legend</label>
    <div id="legend"></div>
  </div>

  <div class="foot">
    資料：<a href="https://github.com/kiang/db.cec.gov.tw" target="_blank" rel="noopener">中選會選舉資料庫（江明宗整理）</a>、
    <a href="https://github.com/kiang/taiwan_basecode" target="_blank" rel="noopener">村里界圖</a>（CC BY 4.0）。
    拜票點 © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors（ODbL）。
    村里界以 2022 為準；2014/2018 經代碼校接，少數改制里可能缺值。
  </div>
</div>

<div id="info"></div>
<div class="hint">滑鼠看各里數據・點擊看投開票所下鑽・滾輪縮放</div>
<div id="loading"><div class="spin"></div><div>載入村里界與選舉資料…</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
